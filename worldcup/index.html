<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>جماهير مباريات كأس العالم الرميثية 🏆</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="adminbtn" href="admin.html">⚙️ المشرف</a>
    </div>
    <div class="hero">
      <div class="emblem-badge">
        <span class="emblem-trophy">🏆</span>
        <span class="emblem-26">26</span>
      </div>
      <h1>جماهير مباريات كأس العالم <span class="gold">الرميثية</span></h1>
      <p>من دور الـ32 إلى النهائي — توقّع، واجمع النقاط</p>
    </div>

    <div class="namebar">
      <label for="player">اسمك</label>
      <input id="player" type="text" placeholder="اكتب اسمك هنا" autocomplete="name" />
      <button id="confirm-name" class="namebtn">✓</button>
    </div>

    <div class="tabs">
      <button id="tab-matches" class="active">المباريات</button>
      <button id="tab-board">الترتيب</button>
      <button id="tab-rules">القوانين</button>
    </div>

    <div id="view-matches"></div>
    <div id="view-board" style="display:none"></div>
    <div id="view-rules" style="display:none"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import {
      isConfigured, loadMatches, loadPredictions, loadMyPredictions,
      submitPrediction, buildLeaderboard, scorePrediction, isLocked,
      roundLabel, ROUNDS, friendlyError, POINTS, watch,
    } from './app.js';

    const $ = (s, r = document) => r.querySelector(s);
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    const playerEl = $('#player');
    const confirmBtn = $('#confirm-name');
    const viewMatches = $('#view-matches');
    const viewBoard = $('#view-board');
    const viewRules = $('#view-rules');

    let matches = [];
    let myPreds = new Map();   // match_id -> {home, away}
    let allPreds = [];
    let nameLocked = false;     // is the name confirmed (fixed)?

    function toast(msg, isErr = false) {
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'toast show' + (isErr ? ' err' : '');
      setTimeout(() => (t.className = 'toast'), 2400);
    }

    // ----- name confirmation -----
    playerEl.value = localStorage.getItem('wc_player') || '';
    nameLocked = !!playerEl.value.trim() && localStorage.getItem('wc_confirmed') === '1';

    function setNameUI() {
      playerEl.disabled = nameLocked;
      confirmBtn.disabled = false;
      confirmBtn.textContent = nameLocked ? '✎' : '✓';
      confirmBtn.title = nameLocked ? 'تغيير الاسم' : 'تثبيت الاسم';
      confirmBtn.classList.toggle('confirmed', nameLocked);
    }
    playerEl.addEventListener('input', () => {
      if (!nameLocked) localStorage.setItem('wc_player', playerEl.value.trim());
    });
    playerEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmBtn.click(); });

    confirmBtn.onclick = () => {
      if (!nameLocked) {
        const n = playerEl.value.trim();
        if (!n) { toast('اكتب اسمك أول', true); playerEl.focus(); return; }
        nameLocked = true;
        localStorage.setItem('wc_player', n);
        localStorage.setItem('wc_confirmed', '1');
        setNameUI();
        toast('تم تثبيت اسمك ✅');
        refreshMine();
      } else {
        nameLocked = false;                        // tap ✎ to change the name
        localStorage.removeItem('wc_confirmed');
        setNameUI();
        playerEl.focus();
        renderMatches();
      }
    };
    setNameUI();

    // ----- tabs -----
    const tabBtns = {
      matches: $('#tab-matches'), board: $('#tab-board'), rules: $('#tab-rules'),
    };
    const tabViews = {
      matches: viewMatches, board: viewBoard, rules: viewRules,
    };
    function switchTab(which) {
      for (const k in tabViews) {
        tabViews[k].style.display = k === which ? '' : 'none';
        tabBtns[k].classList.toggle('active', k === which);
      }
      if (which === 'board') renderBoard();
    }
    for (const k in tabBtns) tabBtns[k].onclick = () => switchTab(k);

    // ----- rendering matches -----
    function teamHTML(name, flag, side) {
      const tbd = !name;
      return `<div class="team ${side}">
        <span class="flag">${flag ? esc(flag) : '⚽️'}</span>
        <span class="name ${tbd ? 'tbd' : ''}">${tbd ? 'غير محدّد' : esc(name)}</span>
      </div>`;
    }

    function matchCard(m) {
      const locked = isLocked(m);
      const mine = myPreds.get(m.id);
      const predicted = !!mine;          // already saved -> cannot edit
      const ph = mine ? mine.home : '';
      const pa = mine ? mine.away : '';
      const inputsOff = locked || predicted;

      let badge = '';
      if (m.finished) badge = '<span class="badge done">انتهت</span>';
      else if (locked) badge = '<span class="badge locked">مغلقة 🔒</span>';
      else if (predicted) badge = '<span class="badge done">تم التوقع ✓</span>';
      else badge = '<span class="badge live">مفتوحة</span>';

      let resultLine = '';
      if (m.finished) {
        const pts = mine
          ? scorePrediction(mine.home, mine.away, m.home_score, m.away_score)
          : null;
        const ptsTag = mine
          ? `<span class="pts ${pts > 0 ? 'good' : 'zero'}">${pts > 0 ? '+' + pts : '0'} نقطة</span>`
          : '';
        resultLine = `<div class="result-line">
          النتيجة الرسمية: <b>${m.home_score} - ${m.away_score}</b>${ptsTag}
        </div>`;
      }

      const kickoff = m.kickoff
        ? new Date(m.kickoff).toLocaleString('ar', { dateStyle: 'medium', timeStyle: 'short' })
        : '';
      const venueLine = kickoff ? `<div class="venue-line">🗓️ ${esc(kickoff)}</div>` : '';

      // action area
      let actionHTML = '';
      if (!m.finished && predicted) {
        actionHTML = `<div class="predicted-note">✓ توقعك محفوظ (${mine.home} - ${mine.away}) — لا يمكن التعديل</div>`;
      } else if (!locked && !predicted) {
        actionHTML = `<div class="card-actions"><button class="btn save">حفظ التوقع</button></div>`;
      }

      return `<div class="card" data-id="${m.id}">
        <div class="meta">
          <span>مباراة ${m.match_no}</span>
          ${badge}
          <span></span>
        </div>
        <div class="match">
          ${teamHTML(m.home_team, m.home_flag, 'home')}
          <div class="scorebox">
            <div class="stepper">
              <button type="button" class="step minus" ${inputsOff ? 'disabled' : ''}>−</button>
              <input type="number" min="0" max="99" inputmode="numeric"
                class="sc-home" value="${ph}" ${inputsOff ? 'disabled' : ''} />
              <button type="button" class="step plus" ${inputsOff ? 'disabled' : ''}>+</button>
            </div>
            <span class="dash">-</span>
            <div class="stepper">
              <button type="button" class="step minus" ${inputsOff ? 'disabled' : ''}>−</button>
              <input type="number" min="0" max="99" inputmode="numeric"
                class="sc-away" value="${pa}" ${inputsOff ? 'disabled' : ''} />
              <button type="button" class="step plus" ${inputsOff ? 'disabled' : ''}>+</button>
            </div>
          </div>
          ${teamHTML(m.away_team, m.away_flag, 'away')}
        </div>
        ${venueLine}
        ${resultLine}
        ${actionHTML}
      </div>`;
    }

    function renderMatches() {
      // require a confirmed name before showing/using the matches section
      if (!nameLocked) {
        viewMatches.innerHTML = `<div class="notice" style="text-align:center">
          👋 اكتب اسمك فوق واضغط <b>✓</b> عشان تشوف المباريات وتبدأ التوقع.
        </div>`;
        return;
      }
      // finished matches drop off the schedule
      const upcoming = matches.filter((m) => !m.finished);
      if (!upcoming.length) {
        viewMatches.innerHTML = `<div class="empty">ما في مباريات قادمة حالياً ⚽️<br>
          شوف نتائجك في تبويب <b>الترتيب</b>.</div>`;
        return;
      }
      // group into sections by round (group stage first, then knockout rounds)
      const groups = {};
      for (const m of upcoming) (groups[m.round] ||= []).push(m);
      const roundOrder = (code) => {
        if (ROUNDS[code]) return ROUNDS[code].order;
        if (String(code).startsWith('المجموعة')) return -1; // groups before knockout
        return 9;
      };
      const order = Object.keys(groups).sort(
        (a, b) => roundOrder(a) - roundOrder(b) || a.localeCompare(b, 'ar'));

      viewMatches.innerHTML = order.map((r) =>
        `<div class="round-title">${esc(roundLabel(r))}</div>` +
        groups[r].slice().sort((a, b) =>
          (new Date(a.kickoff || 8.64e15)) - (new Date(b.kickoff || 8.64e15)) || a.id - b.id)
          .map(matchCard).join('')
      ).join('');

      viewMatches.querySelectorAll('.card').forEach((card) => {
        const btn = card.querySelector('.save');
        if (btn) btn.onclick = () => onSave(card);
        card.querySelectorAll('.stepper').forEach((st) => {
          const inp = st.querySelector('input');
          const set = (d) => { inp.value = Math.max(0, Math.min(99, (parseInt(inp.value) || 0) + d)); };
          const p = st.querySelector('.plus'), mn = st.querySelector('.minus');
          if (p) p.onclick = () => set(1);
          if (mn) mn.onclick = () => set(-1);
        });
      });
    }

    async function onSave(card) {
      const name = playerEl.value.trim();
      if (!name) { toast('ثبّت اسمك أول', true); return; }

      const id = +card.dataset.id;
      const h = card.querySelector('.sc-home').value;
      const a = card.querySelector('.sc-away').value;
      if (h === '' || a === '') { toast('اكتب النتيجة للفريقين', true); return; }

      const btn = card.querySelector('.save');
      btn.disabled = true;
      try {
        await submitPrediction(id, name, +h, +a);
        myPreds.set(id, { home: +h, away: +a });
        toast('انحفظ توقعك ✅ (لا يمكن التعديل)');
        renderMatches();   // re-render: this match is now locked
      } catch (e) {
        toast(friendlyError(e), true);
        btn.disabled = false;
        if (String(e.message || e).includes('MATCH_LOCKED')) loadAll();
      }
    }

    // ----- full scoring rules -----
    function renderRules() {
      viewRules.innerHTML = `
        <div class="round-title">قانون النقاط</div>
        <div class="rules">
          <div class="rule">
            <span class="rule-pts">${POINTS.exact}<small>نقاط</small></span>
            <div><b>النتيجة الكاملة صحيحة</b><br>
              <span class="rule-ex">أن تتوقّع عدد أهداف الفريقين بشكل صحيح. مثال: انتهت المباراة 2-1، وكان توقّعك 2-1.</span></div>
          </div>
          <div class="rule">
            <span class="rule-pts">${POINTS.winnerScore}<small>نقاط</small></span>
            <div><b>الفائز وعدد أهدافه صحيح</b><br>
              <span class="rule-ex">أن تتوقّع الفريق الفائز وعدد أهدافه بشكل صحيح، مع خطأ في عدد أهداف الفريق الخاسر. مثال: انتهت المباراة 3-1، وكان توقّعك 3-0.</span></div>
          </div>
          <div class="rule">
            <span class="rule-pts">${POINTS.winner}<small>نقطة</small></span>
            <div><b>الفريق الفائز فقط</b><br>
              <span class="rule-ex">أن تتوقّع الفريق الفائز فقط دون النتيجة الصحيحة. مثال: انتهت المباراة 3-1، وكان توقّعك 2-0.</span></div>
          </div>
        </div>
        <div class="notice" style="margin-top:14px">
          • يُصبح التوقّع <b>نهائياً</b> بعد حفظه، ويُغلَق باب التوقّع عند بداية المباراة.<br>
          • في الأدوار الإقصائية، لا تؤثّر ركلات الترجيح على نقاط التوقّع، إذ تُحتسب النقاط على النتيجة في الوقت الأصلي.
        </div>`;
    }

    // ----- leaderboard -----
    const prizesHTML = `
      <div class="round-title">🏆 الجوائز</div>
      <div class="prizes3">
        <div class="prize3 p1"><div class="prize-medal">🥇</div>
          <div class="prize-place">الأول</div><div class="prize-amt">50 دينار</div></div>
        <div class="prize3 p2"><div class="prize-medal">🥈</div>
          <div class="prize-place">الثاني</div><div class="prize-amt">30 دينار</div></div>
        <div class="prize3 p3"><div class="prize-medal">🥉</div>
          <div class="prize-place">الثالث</div><div class="prize-amt">كابون مساج</div></div>
      </div>`;

    function renderBoard() {
      const me = playerEl.value.trim();
      const rows = buildLeaderboard(matches, allPreds);
      const finishedCount = matches.filter((m) => m.finished).length;

      if (!rows.length) {
        viewBoard.innerHTML = prizesHTML +
          `<div class="empty">ما في توقعات بعد.<br>كن أول من يتوقّع! ⚽️</div>`;
        return;
      }

      const head = `<div class="round-title">الترتيب العام
        <span style="font-size:12px;color:var(--muted);font-weight:600">
          (${finishedCount} مباراة انتهت)</span></div>`;

      const body = rows.map((r, i) => {
        const rank = i + 1;
        const rc = rank <= 3 ? `r${rank}` : '';
        const medal = ['🥇', '🥈', '🥉'][i] || rank;
        return `<tr class="${r.name === me ? 'me' : ''}">
          <td class="rank ${rc}">${medal}</td>
          <td class="name">${esc(r.name)}</td>
          <td>${r.exact}</td>
          <td>${r.played}</td>
          <td class="total">${r.points}</td>
        </tr>`;
      }).join('');

      viewBoard.innerHTML = prizesHTML + head + `<table class="lb">
        <thead><tr>
          <th>#</th><th>الاسم</th><th>نتيجة مضبوطة</th><th>توقعات محسوبة</th><th>النقاط</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>
      <div class="scoring-note">
        <b>النقاط:</b>
        <span class="chip">${POINTS.exact} نتيجة كاملة</span>
        <span class="chip">${POINTS.winnerScore} الفائز + نتيجته</span>
        <span class="chip">${POINTS.winner} الفائز فقط</span>
      </div>`;
    }

    // ----- data -----
    async function refreshMine() {
      const name = playerEl.value.trim();
      myPreds = new Map();
      if (name) {
        try {
          const mine = await loadMyPredictions(name);
          for (const p of mine) myPreds.set(p.match_id, { home: p.home_score, away: p.away_score });
        } catch (_) {}
      }
      renderMatches();
    }

    async function loadAll() {
      try {
        [matches, allPreds] = await Promise.all([loadMatches(), loadPredictions()]);
        await refreshMine();
      } catch (e) {
        viewMatches.innerHTML = `<div class="notice">
          <b>تعذّر الاتصال بقاعدة البيانات.</b><br>
          تأكد إنك عبّيت بيانات Supabase في <code>config.js</code> وشغّلت <code>db.sql</code>.<br>
          <span style="color:var(--error)">${esc(e.message || e)}</span>
        </div>`;
      }
    }

    // Auto-update without disrupting a score the user is currently typing.
    function isEditing() {
      const a = document.activeElement;
      return a && a.matches && a.matches('.sc-home, .sc-away');
    }
    async function reload() {
      let data;
      try { data = await Promise.all([loadMatches(), loadPredictions()]); }
      catch (_) { return; }
      [matches, allPreds] = data;
      const name = playerEl.value.trim();
      myPreds = new Map();
      if (name) {
        try {
          for (const p of await loadMyPredictions(name))
            myPreds.set(p.match_id, { home: p.home_score, away: p.away_score });
        } catch (_) {}
      }
      if (viewBoard.style.display !== 'none') renderBoard();
      else if (!isEditing()) renderMatches();
    }

    renderRules();
    loadAll().then(() => watch(reload));
  </script>
</body>
</html>
