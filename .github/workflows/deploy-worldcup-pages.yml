name: Deploy World Cup site to Pages

# Publishes the standalone worldcup/ site to the gh-pages branch, which GitHub
# Pages then serves at https://<user>.github.io/<repo>/ . Runs on every push to
# the feature branch that touches worldcup/, and can be triggered manually.

on:
  push:
    branches: [claude/world-cup-prediction-site-inxiux]
    paths: ['worldcup/**', '.github/workflows/deploy-worldcup-pages.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: worldcup-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish worldcup/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./worldcup
          publish_branch: gh-pages
          force_orphan: true
