name: World Cup auto-fetch results

# Every 20 minutes: (1) make sure the DB schema/functions exist (runs db.sql via
# the Supabase Management API), then (2) pull fixtures/results from
# football-data.org and push them into Supabase via the admin RPCs.
#
# Repo Secrets (Settings → Secrets and variables → Actions):
#   FOOTBALL_API_KEY       - football-data.org token
#   WC_ADMIN_PIN           - admin PIN (e.g. 1993)
#   SUPABASE_ACCESS_TOKEN  - Supabase personal access token (for auto-running db.sql)

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wc-autofetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ensure DB schema (auto-run db.sql)
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "No SUPABASE_ACCESS_TOKEN secret set — skipping auto schema setup."
            echo "(Add it, or run db.sql once manually in the Supabase SQL Editor.)"
            exit 0
          fi
          payload=$(jq -Rs '{query: .}' < .github/db/wc-db.sql)
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/vnyhbppzufadqxpbijnb/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${payload}")
          echo "Schema setup HTTP ${code}"
          head -c 400 /tmp/resp.json 2>/dev/null || true
          echo

      - name: Fetch & update results
        run: node .github/scripts/wc-fetch-results.mjs
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          WC_ADMIN_PIN: ${{ secrets.WC_ADMIN_PIN }}
          SUPABASE_URL: https://vnyhbppzufadqxpbijnb.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_OPnob-SkO9u-Z7PN7tYTog_paKjdBTJ
