<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>جماهير مباريات كأس العالم الرميثية 🏆</title>
  <link rel="stylesheet" href="styles.css?v=21" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="adminbtn" href="transparency.html?v=8">🔍 الشفافية</a>
      <a class="adminbtn" href="admin.html">⚙️ المشرف</a>
    </div>
    <div class="hero">
      <div class="emblem-badge">
        <span class="emblem-trophy">🏆</span>
        <span class="emblem-26">26</span>
      </div>
      <h1>جماهير مباريات كأس العالم <span class="gold">الرميثية</span></h1>
      <p>من دور الـ32 إلى النهائي — توقّع، واجمع النقاط</p>
    </div>

    <div class="namebar">
      <label for="player">اسمك</label>
      <input id="player" type="text" placeholder="اكتب اسمك هنا" autocomplete="name" />
      <button id="confirm-name" class="namebtn">✓</button>
    </div>

    <div class="tabs">
      <button id="tab-matches" class="active">المباريات</button>
      <button id="tab-board">الترتيب</button>
      <button id="tab-rules">القوانين</button>
    </div>

    <div id="view-matches"></div>
    <div id="view-board" style="display:none"></div>
    <div id="view-rules" style="display:none"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import {
      isConfigured, loadMatches, loadPredictions, loadMyPredictions,
      submitPrediction, submitWinner, buildLeaderboard, scorePrediction,
      scoreRow, isLocked, roundLabel, matchDay, flagHTML, ROUNDS, friendlyError, POINTS, watch,
    } from './app.js?v=25';

    const $ = (s, r = document) => r.querySelector(s);
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    const playerEl = $('#player');
    const confirmBtn = $('#confirm-name');
    const viewMatches = $('#view-matches');
    const viewBoard = $('#view-board');
    const viewRules = $('#view-rules');

    let matches = [];
    let myPreds = new Map();   // match_id -> {home, away}
    let allPreds = [];
    let nameLocked = false;     // is the name confirmed (fixed)?
    let matchFilter = 'upcoming'; // matches filter: upcoming | finished | all
    let lastSig = '';           // last rendered data signature (skip no-op re-renders)

    // The game starts at the Round of 32 — hide every match before this date.
    const SHOW_FROM = new Date('2026-06-28T00:00:00Z').getTime();
    const afterCutoff = (m) => !m.kickoff || new Date(m.kickoff).getTime() >= SHOW_FROM;

    function toast(msg, isErr = false) {
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'toast show' + (isErr ? ' err' : '');
      setTimeout(() => (t.className = 'toast'), 2400);
    }

    // ----- name confirmation -----
    playerEl.value = localStorage.getItem('wc_player') || '';
    nameLocked = !!playerEl.value.trim() && localStorage.getItem('wc_confirmed') === '1';

    function setNameUI() {
      playerEl.disabled = nameLocked;
      confirmBtn.disabled = false;
      confirmBtn.textContent = nameLocked ? '✎' : '✓';
      confirmBtn.title = nameLocked ? 'تغيير الاسم' : 'تثبيت الاسم';
      confirmBtn.classList.toggle('confirmed', nameLocked);
    }
    playerEl.addEventListener('input', () => {
      if (!nameLocked) localStorage.setItem('wc_player', playerEl.value.trim());
    });
    playerEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmBtn.click(); });

    confirmBtn.onclick = () => {
      if (!nameLocked) {
        const n = playerEl.value.trim();
        if (!n) { toast('اكتب اسمك أول', true); playerEl.focus(); return; }
        nameLocked = true;
        localStorage.setItem('wc_player', n);
        localStorage.setItem('wc_confirmed', '1');
        setNameUI();
        toast('تم تثبيت اسمك ✅');
        refreshMine();
      } else {
        nameLocked = false;                        // tap ✎ to change the name
        localStorage.removeItem('wc_confirmed');
        setNameUI();
        playerEl.focus();
        renderMatches();
      }
    };
    setNameUI();

    // ----- tabs -----
    const tabBtns = {
      matches: $('#tab-matches'),
      board: $('#tab-board'), rules: $('#tab-rules'),
    };
    const tabViews = {
      matches: viewMatches, board: viewBoard, rules: viewRules,
    };
    function switchTab(which) {
      for (const k in tabViews) {
        tabViews[k].style.display = k === which ? '' : 'none';
        tabBtns[k].classList.toggle('active', k === which);
      }
      if (which === 'board') renderBoard();
    }
    for (const k in tabBtns) tabBtns[k].onclick = () => switchTab(k);

    // ----- rendering matches -----
    // a match is shown only once BOTH teams are decided (not TBD)
    function teamsKnown(m) {
      return !!(m.home_team && String(m.home_team).trim() &&
                m.away_team && String(m.away_team).trim());
    }

    function teamHTML(name, flag, side) {
      const tbd = !name;
      return `<div class="team ${side}">
        ${flagHTML(flag)}
        <span class="name ${tbd ? 'tbd' : ''}">${tbd ? 'غير محدّد' : esc(name)}</span>
      </div>`;
    }

    function matchCard(m) {
      // teams not decided yet -> show a schedule "preview" card, no prediction
      if (!teamsKnown(m) && !m.finished) {
        const kt = m.kickoff
          ? new Date(m.kickoff).toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' })
          : '';
        const vline = kt ? `<div class="venue-line">🕐 ${esc(kt)}</div>` : '';
        return `<div class="card preview" data-id="${m.id}">
          <div class="meta">
            <span>${esc(roundLabel(m.round))}</span>
            <span class="badge soon">قريباً</span>
            <span class="mno">مباراة ${m.id}</span>
          </div>
          <div class="match">
            ${teamHTML(m.home_team, m.home_flag, 'home')}
            <div class="scorebox"><span class="vs">VS</span></div>
            ${teamHTML(m.away_team, m.away_flag, 'away')}
          </div>
          ${vline}
          <div class="predicted-note">⏳ يفتح التوقّع أول ما تتحدد الفرق</div>
        </div>`;
      }

      const locked = isLocked(m);
      const started = !m.finished && m.kickoff && new Date(m.kickoff).getTime() <= Date.now();
      const mine = myPreds.get(m.id);
      const predicted = !!mine;          // already saved -> cannot edit
      const pickOnly = predicted && mine.pick;   // winner-only prediction
      const ph = predicted && !pickOnly ? mine.home : '';
      const pa = predicted && !pickOnly ? mine.away : '';
      const inputsOff = locked || predicted;

      let badge = '';
      if (m.finished) badge = '<span class="badge done">انتهت</span>';
      else if (started) badge = '<span class="badge livenow">🔴 جارية الآن</span>';
      else if (predicted) badge = '<span class="badge done">تم التوقع ✓</span>';
      else if (locked) badge = '<span class="badge locked">مغلقة 🔒</span>';
      else badge = '<span class="badge live">مفتوحة</span>';

      let resultLine = '';
      if (m.finished) {
        const pts = mine ? scoreRow(mine, m) : null;
        const ptsTag = mine
          ? `<span class="pts ${pts > 0 ? 'good' : 'zero'}">لك ${pts > 0 ? '+' + pts : '0'} نقطة</span>`
          : '';
        resultLine = `<div class="result-line">
          <span>النتيجة الرسمية: <b>${m.home_score} - ${m.away_score}</b>${(m.home_pen != null && m.away_pen != null) ? ` <span style="color:var(--muted,#789)">(ركلات ${m.home_pen}-${m.away_pen} ${esc((m.home_pen > m.away_pen ? m.home_team : m.away_team) || '')})</span>` : ''}</span>
          ${ptsTag}
        </div>`;
      }

      const ktime = m.kickoff
        ? new Date(m.kickoff).toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' })
        : '';
      const venueLine = ktime ? `<div class="venue-line">🕐 ${esc(ktime)}</div>` : '';

      // action area
      const isKnockout = m.id <= 32;   // every match here is knockout (penalties possible)
      let actionHTML = '';
      if (!m.finished && pickOnly) {
        const t = mine.pick === 'home' ? m.home_team : m.away_team;
        actionHTML = `<div class="predicted-note">🏆 توقعت فوز <b>${esc(t || '')}</b> — لا يمكن التعديل</div>`;
      } else if (!m.finished && predicted) {
        const penQ = mine.pen_pick ? (mine.pen_pick === 'home' ? m.home_team : m.away_team)
          : ((mine.pen_home != null && mine.pen_away != null) ? (mine.pen_home > mine.pen_away ? m.home_team : m.away_team) : '');
        const penNote = penQ ? ` · 🥅 تأهّل <b>${esc(penQ)}</b> بالركلات` : '';
        actionHTML = `<div class="predicted-note">✓ توقعك محفوظ (${mine.home} - ${mine.away})${penNote} — لا يمكن التعديل</div>`;
      } else if (!locked && !predicted) {
        // penalty winner picker: shown only when the typed score is a draw (knockout decider)
        const penPickHTML = isKnockout ? `<div class="penpick" style="display:none">
            <div class="penpick-q">🥅 توقّعت تعادل — منو يتأهّل بالركلات؟ <b style="color:var(--error,#c33)">(إجباري)</b></div>
            <div class="penpick-opts">
              <button type="button" class="btn pensel" data-pen="home">${esc(m.home_team || '')}</button>
              <button type="button" class="btn pensel" data-pen="away">${esc(m.away_team || '')}</button>
            </div>
          </div>` : '';
        actionHTML = `<div class="card-actions"><button class="btn save">حفظ التوقّع</button></div>
          ${penPickHTML}`;
      }

      // who predicted this match — reveal everyone's prediction once the match is
      // locked or finished (before that, names only, so nobody copies).
      const reveal = m.finished || locked;
      const preds = allPreds.filter((p) => p.match_id === m.id);
      let predictorsHTML;
      if (preds.length) {
        const items = preds
          .slice()
          .sort((a, b) => String(a.player_name).localeCompare(b.player_name, 'ar'))
          .map((p) => {
            const nm = esc(p.player_name);
            if (reveal) {
              let guess;
              if (p.pick) {
                guess = '🏆 ' + esc((p.pick === 'home' ? m.home_team : m.away_team) || '');
              } else {
                // show the score AND the team they predicted to win, so it's clear
                // who picked which side (a draw shows the penalty qualifier instead)
                guess = `${p.home_score}-${p.away_score}`;
                const d = Math.sign((p.home_score || 0) - (p.away_score || 0));
                if (d !== 0) guess += ` 🏆${esc((d > 0 ? m.home_team : m.away_team) || '')}`;
                // penalty-decided draw -> show only the qualifier team (the winner pick)
                else if (p.pen_pick) guess = `🥅${esc((p.pen_pick === 'home' ? m.home_team : m.away_team) || '')}`;
                else if (p.pen_home != null && p.pen_away != null) guess = `🥅${esc((p.pen_home > p.pen_away ? m.home_team : m.away_team) || '')}`;
              }
              const ptsTag = m.finished
                ? (() => { const pts = scoreRow(p, m);
                    return `<span class="pts ${pts > 0 ? 'good' : 'zero'}">${pts > 0 ? '+' + pts : '0'}</span>`; })()
                : '';
              return `<div class="pred-row"><span class="pr-name">${nm}</span><span class="pr-guess"><b>${guess}</b> ${ptsTag}</span></div>`;
            }
            return `<div class="pred-row"><span class="pr-name">${nm}</span></div>`;
          }).join('');
        predictorsHTML = `<details class="predictors">
          <summary>👥 توقّعوا (${preds.length})</summary>
          <div class="pred-rows">${items}</div>
        </details>`;
      } else {
        predictorsHTML = `<div class="predictors-empty">👥 ما توقّع أحد بعد</div>`;
      }

      // crowd favorite — the team most players predicted to win
      let favHTML = '';
      if (preds.length) {
        let h = 0, a = 0, d = 0;
        for (const p of preds) {
          let side;
          if (p.pick) side = p.pick;
          else { const s = Math.sign((p.home_score || 0) - (p.away_score || 0));
            side = s > 0 ? 'home' : s < 0 ? 'away' : 'draw'; }
          if (side === 'home') h++; else if (side === 'away') a++; else d++;
        }
        const max = Math.max(h, a, d);
        let label = '';
        if (max > 0 && h === max && h > a && h > d) label = `🏆 ${esc(m.home_team || '')} (${h}/${preds.length})`;
        else if (max > 0 && a === max && a > h && a > d) label = `🏆 ${esc(m.away_team || '')} (${a}/${preds.length})`;
        else if (max > 0 && d === max && d > h && d > a) label = `🤝 تعادل (${d}/${preds.length})`;
        else if (max > 0) label = 'توقعات متقاربة';
        if (label) favHTML = `<div class="favpick">🔮 الأكثر توقّعاً: <b>${label}</b></div>`;
      }

      return `<div class="card" data-id="${m.id}">
        <div class="meta">
          <span>${esc(roundLabel(m.round))}</span>
          ${badge}
          <span class="mno">مباراة ${m.id}</span>
        </div>
        <div class="match">
          ${teamHTML(m.home_team, m.home_flag, 'home')}
          <div class="scorebox">
            <div class="stepper">
              <button type="button" class="step plus" ${inputsOff ? 'disabled' : ''}>+</button>
              <input type="number" min="0" max="99" inputmode="numeric"
                class="sc-home" value="${ph}" ${inputsOff ? 'disabled' : ''} />
              <button type="button" class="step minus" ${inputsOff ? 'disabled' : ''}>−</button>
            </div>
            <span class="dash">-</span>
            <div class="stepper">
              <button type="button" class="step plus" ${inputsOff ? 'disabled' : ''}>+</button>
              <input type="number" min="0" max="99" inputmode="numeric"
                class="sc-away" value="${pa}" ${inputsOff ? 'disabled' : ''} />
              <button type="button" class="step minus" ${inputsOff ? 'disabled' : ''}>−</button>
            </div>
          </div>
          ${teamHTML(m.away_team, m.away_flag, 'away')}
        </div>
        ${venueLine}
        ${resultLine}
        ${favHTML}
        ${actionHTML}
        ${predictorsHTML}
      </div>`;
    }

    function renderMatches() {
      // require a confirmed name before showing/using the matches section
      if (!nameLocked) {
        viewMatches.innerHTML = `<div class="notice" style="text-align:center">
          👋 اكتب اسمك فوق واضغط <b>✓</b> عشان تشوف المباريات وتبدأ التوقع.
        </div>`;
        return;
      }
      const DAY = 24 * 3600 * 1000;
      // "القادمة" = today + tomorrow (full slate). Past-day & finished -> "المنتهية".
      const t0 = new Date(); t0.setHours(0, 0, 0, 0);
      const startMs = t0.getTime();
      const dayPassed = (m) => m.kickoff && new Date(m.kickoff).getTime() < startMs;
      const UPCOMING_WINDOW = 3 * DAY;   // today + next 2 days

      // filters: status (قادمة/منتهية) + by round
      const ROUND_FILTERS = [
        ['R32', 'دور 32'], ['R16', 'دور 16'], ['QF', 'ربع'], ['SF', 'نص'], ['FINAL', 'النهائي'],
      ];
      const roundCodes = ROUND_FILTERS.map(([c]) => c);
      const chip = (f, label) =>
        `<button data-f="${f}" class="${matchFilter === f ? 'active' : ''}">${label}</button>`;
      const filterBar = `<div class="mfilter">
        ${chip('upcoming', 'القادمة')}
        ${ROUND_FILTERS.map(([c, l]) => chip(c, l)).join('')}
      </div>
      <button class="past-btn ${matchFilter === 'past' ? 'active' : ''}" data-f="past">🏁 المباريات السابقة</button>`;
      const wireFilter = () => {
        viewMatches.querySelectorAll('[data-f]').forEach((b) => {
          b.onclick = () => { matchFilter = b.dataset.f; renderMatches(); };
        });
      };

      let list;
      if (matchFilter === 'past') {   // finished matches only
        list = matches.filter((m) => m.finished);
      } else if (roundCodes.includes(matchFilter)) {
        list = matches.filter((m) => matchFilter === 'FINAL'
          ? (m.round === 'FINAL' || m.round === '3RD')
          : m.round === matchFilter);
      } else { // القادمة: live + upcoming only (finished move to السابقة)
        list = matches.filter((m) => {
          if (m.finished) return false;
          const kt = m.kickoff ? new Date(m.kickoff).getTime() : null;
          if (kt && kt <= Date.now()) return true;    // live, not finished -> stay until the result is in
          return !dayPassed(m) && kt && kt < startMs + UPCOMING_WINDOW;
        });
      }

      if (!list.length) {
        const emptyMsg = matchFilter === 'past'
          ? 'ما في مباريات سابقة بعد ⚽️'
          : roundCodes.includes(matchFilter)
            ? 'مباريات هذا الدور ما تحددت بعد ⚽️'
            : 'ما في مباريات قادمة حالياً ⚽️';
        viewMatches.innerHTML = filterBar + `<div class="empty">${emptyMsg}</div>`;
        wireFilter();
        return;
      }
      // group into sections by DAY — past = newest first, otherwise chronological
      const sorted = list.slice().sort((a, b) => {
        const t = (new Date(a.kickoff || 8.64e15)) - (new Date(b.kickoff || 8.64e15)) || a.id - b.id;
        return matchFilter === 'past' ? -t : t;
      });
      const days = new Map();
      for (const m of sorted) {
        const d = matchDay(m.kickoff);   // late-night kickoffs stay on the prior day
        const key = d
          ? `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`
          : 'tbd';
        const label = d
          ? d.toLocaleDateString('ar', { weekday: 'long', day: 'numeric', month: 'long' })
          : 'بدون موعد';
        if (!days.has(key)) days.set(key, { label, items: [] });
        days.get(key).items.push(m);
      }

      const renderItem = matchCard;
      viewMatches.innerHTML = filterBar + [...days.values()].map((day) =>
        `<div class="round-title day">📅 ${esc(day.label)}</div>` +
        day.items.map(renderItem).join('')
      ).join('');
      wireFilter();

      viewMatches.querySelectorAll('.card').forEach((card) => {
        const btn = card.querySelector('.save');
        if (btn) btn.onclick = () => onSave(card);

        // penalty winner buttons — reveal only when the typed score is a draw
        const penWrap = card.querySelector('.penpick');
        const hEl = card.querySelector('.sc-home');
        const aEl = card.querySelector('.sc-away');
        const refreshPen = () => {
          if (!penWrap || !hEl || !aEl) return;
          const h = hEl.value, a = aEl.value;
          const draw = h !== '' && a !== '' && +h === +a;
          penWrap.style.display = draw ? '' : 'none';
          if (!draw) {
            card.dataset.penPick = '';
            penWrap.querySelectorAll('.pensel').forEach((b) => b.classList.remove('saved'));
          }
        };
        card.querySelectorAll('.pensel').forEach((pb) => {
          pb.onclick = () => {
            card.dataset.penPick = pb.dataset.pen;
            card.querySelectorAll('.pensel').forEach((b) => b.classList.toggle('saved', b === pb));
          };
        });

        card.querySelectorAll('.stepper').forEach((st) => {
          const inp = st.querySelector('input');
          const set = (d) => {
            inp.value = Math.max(0, Math.min(99, (parseInt(inp.value) || 0) + d));
            refreshPen();
          };
          const p = st.querySelector('.plus'), mn = st.querySelector('.minus');
          if (p) p.onclick = () => set(1);
          if (mn) mn.onclick = () => set(-1);
        });
        if (hEl) hEl.addEventListener('input', refreshPen);
        if (aEl) aEl.addEventListener('input', refreshPen);
        refreshPen();
      });
    }

    async function onSave(card) {
      const name = playerEl.value.trim();
      if (!name) { toast('ثبّت اسمك أول', true); return; }

      const id = +card.dataset.id;
      const h = card.querySelector('.sc-home').value;
      const a = card.querySelector('.sc-away').value;
      if (h === '' || a === '') { toast('اكتب النتيجة للفريقين', true); return; }

      // a drawn prediction in a knockout match needs a penalty winner pick
      const isKnockout = id <= 32;
      const draw = +h === +a;
      let penH = null, penA = null;
      if (draw && isKnockout) {
        const penPick = card.dataset.penPick || null;
        if (!penPick) { toast('توقّعت تعادل — اختر منو يتأهّل بالركلات', true); return; }
        // store the pick as a 1-0 marker so the backend records the qualifier
        penH = penPick === 'home' ? 1 : 0;
        penA = penPick === 'home' ? 0 : 1;
      }
      const penPick = (penH != null && penA != null) ? (penH > penA ? 'home' : 'away') : null;

      const btn = card.querySelector('.save');
      btn.disabled = true;
      try {
        await submitPrediction(id, name, +h, +a, penH, penA);
        myPreds.set(id, { home: +h, away: +a, pick: null, manual_points: null, pen_pick: penPick, pen_home: penH, pen_away: penA });
        toast('انحفظ توقعك ✅ (لا يمكن التعديل)');
        renderMatches();   // re-render: this match is now locked
      } catch (e) {
        toast(friendlyError(e), true);
        btn.disabled = false;
        if (String(e.message || e).includes('MATCH_LOCKED')) loadAll();
      }
    }

    // ----- full scoring rules -----
    function renderRules() {
      viewRules.innerHTML = `
        <div class="round-title">قانون النقاط</div>
        <div class="notice" style="margin-bottom:12px;font-size:13px;text-align:center">
          تُحتسب نتيجة المباراة على النتيجة <b>قبل ركلات الترجيح</b>.
        </div>
        <div class="rules">
          <div class="rule">
            <span class="rule-pts">${POINTS.exact}<small>نقاط</small></span>
            <div><b>النتيجة الصحيحة بالضبط</b><br>
              <span class="rule-ex">تضبط عدد أهداف الفريقين. مثال: انتهت 2-1 وتوقّعك 2-1.</span></div>
          </div>
          <div class="rule">
            <span class="rule-pts">${POINTS.winnerScore}<small>نقاط</small></span>
            <div><b>الفائز + عدد أهدافه، أو تعادل صحيح</b><br>
              <span class="rule-ex">تضبط الفريق الفائز وعدد أهدافه (الخاسر غلط)، مثال: 3-1 وتوقّعك 3-0. أو توقّعت تعادل وصار تعادل بنتيجة مختلفة (1-1 والنتيجة 2-2).</span></div>
          </div>
          <div class="rule">
            <span class="rule-pts">${POINTS.winner}<small>نقطة</small></span>
            <div><b>الفريق الفائز فقط</b><br>
              <span class="rule-ex">تضبط الفائز بدون نتيجته الصحيحة. مثال: انتهت 3-1 وتوقّعك 2-1.</span></div>
          </div>
          <div class="rule">
            <span class="rule-pts">+${POINTS.penWinner}<small>نقطة</small></span>
            <div><b>الفائز بالركلات</b><br>
              <span class="rule-ex">تضبط الفريق الفائز بركلات الترجيح — وتُحسب فقط إذا وصلت المباراة فعلاً للركلات.</span></div>
          </div>
          <div class="rule">
            <span class="rule-pts">0<small>نقطة</small></span>
            <div><b>توقّع غير صحيح</b><br>
              <span class="rule-ex">إذا أخطأت مسار المباراة (الفائز أو التعادل).</span></div>
          </div>
        </div>
        <div class="notice" style="margin-top:14px">
          🥅 ركلات الترجيح:<br>
          • لازم تتوقّع <b>التعادل</b> قبل الركلات عشان تستحق نقطة الركلات.<br>
          • نقطة الركلات (+${POINTS.penWinner}) تُضاف فقط إذا وصلت المباراة فعلاً للركلات.<br>
          • أعلى نقاط: مباراة عادية <b>5</b>، ومباراة فيها ركلات <b>7</b>.<br>
          • يُصبح التوقّع <b>نهائياً</b> بعد حفظه، ويُغلَق باب التوقّع عند بداية المباراة.
        </div>`;
    }

    // ----- leaderboard -----
    const prizesHTML = `
      <div class="round-title">🏆 الجوائز</div>
      <div class="prizes3">
        <div class="prize3 p1"><div class="prize-medal">🥇</div>
          <div class="prize-place">الأول</div><div class="prize-amt">100 دينار</div></div>
        <div class="prize3 p2"><div class="prize-medal">🥈</div>
          <div class="prize-place">الثاني</div><div class="prize-amt">50 دينار</div></div>
        <div class="prize3 p3"><div class="prize-medal">🥉</div>
          <div class="prize-place">الثالث</div><div class="prize-amt">كابون غسيل سيارات</div></div>
      </div>
      <div style="text-align:center;font-size:13px;font-weight:800;color:#B88E33;background:rgba(184,142,51,.10);border:1px solid rgba(184,142,51,.30);border-radius:12px;padding:10px;margin-top:10px">
        🎯 الدخول في منافسة الجوائز: <b>100 نقطة</b>
      </div>`;

    function renderBoard() {
      const me = playerEl.value.trim();
      const rows = buildLeaderboard(matches, allPreds);
      const finishedCount = matches.filter((m) => m.finished).length;

      if (!rows.length) {
        viewBoard.innerHTML = prizesHTML +
          `<div class="empty">ما في توقعات بعد.<br>كن أول من يتوقّع! ⚽️</div>`;
        return;
      }

      const head = `<div class="round-title">الترتيب العام
        <span style="font-size:12px;color:var(--muted);font-weight:600">
          (${finishedCount} مباراة انتهت)</span></div>`;

      const body = rows.map((r, i) => {
        const rank = i + 1;
        const rc = rank <= 3 ? `r${rank}` : '';
        const medal = ['🥇', '🥈', '🥉'][i] || rank;
        return `<tr class="${r.name === me ? 'me' : ''}">
          <td class="rank ${rc}">${medal}</td>
          <td class="name">${esc(r.name)}</td>
          <td>${r.predicted}</td>
          <td>${r.correct}</td>
          <td class="total">${r.points}</td>
        </tr>`;
      }).join('');

      viewBoard.innerHTML = prizesHTML + head + `<table class="lb">
        <thead><tr>
          <th>#</th><th>الاسم</th><th>توقّع</th><th>صح</th><th>النقاط</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>
      <div class="scoring-note">
        <b>النقاط:</b>
        <span class="chip">${POINTS.exact} مضبوطة</span>
        <span class="chip">${POINTS.winnerScore} الفائز+أهدافه/تعادل</span>
        <span class="chip">${POINTS.winner} الفائز فقط</span>
        <span class="chip">+${POINTS.penWinner} الركلات</span>
      </div>`;
    }

    // ----- data -----
    async function refreshMine() {
      const name = playerEl.value.trim();
      myPreds = new Map();
      if (name) {
        try {
          const mine = await loadMyPredictions(name);
          for (const p of mine) myPreds.set(p.match_id, { home: p.home_score, away: p.away_score, pick: p.pick, manual_points: p.manual_points, pen_pick: p.pen_pick, pen_home: p.pen_home, pen_away: p.pen_away });
        } catch (_) {}
      }
      renderMatches();
    }

    async function loadAll() {
      try {
        [matches, allPreds] = await Promise.all([loadMatches(), loadPredictions()]);
        matches = matches.filter(afterCutoff);
        await refreshMine();
      } catch (e) {
        viewMatches.innerHTML = `<div class="notice">
          <b>تعذّر الاتصال بقاعدة البيانات.</b><br>
          تأكد إنك عبّيت بيانات Supabase في <code>config.js</code> وشغّلت <code>db.sql</code>.<br>
          <span style="color:var(--error)">${esc(e.message || e)}</span>
        </div>`;
      }
    }

    // Per-match phase (open / started / finished) — part of the render signature
    // so the page re-renders when a match crosses kickoff, but not otherwise.
    function phaseStr(ms) {
      return (ms || []).map((m) => m.finished ? 'F'
        : (m.kickoff && new Date(m.kickoff).getTime() <= Date.now() ? 'S' : 'O')).join('');
    }

    // Auto-update without disrupting a score the user is currently typing.
    function isEditing() {
      const a = document.activeElement;
      return a && a.matches && a.matches('.sc-home, .sc-away');
    }
    async function reload() {
      let data;
      try { data = await Promise.all([loadMatches(), loadPredictions()]); }
      catch (_) { return; }
      const name = playerEl.value.trim();
      // skip the re-render entirely if nothing changed — prevents the page from
      // jumping/scrolling on every 20s poll or realtime ping. The phase string
      // also flips a match open->started->finished so the badge updates on time.
      const sig = JSON.stringify(data) + '|' + name + '|' + phaseStr(data[0]);
      if (sig === lastSig) return;
      lastSig = sig;

      [matches, allPreds] = data;
      matches = matches.filter(afterCutoff);
      myPreds = new Map();
      if (name) {
        try {
          for (const p of await loadMyPredictions(name))
            myPreds.set(p.match_id, { home: p.home_score, away: p.away_score, pick: p.pick, manual_points: p.manual_points, pen_pick: p.pen_pick, pen_home: p.pen_home, pen_away: p.pen_away });
        } catch (_) {}
      }
      if (viewBoard.style.display !== 'none') renderBoard();
      else if (!isEditing()) renderMatches();
    }

    renderRules();
    loadAll().then(() => {
      lastSig = JSON.stringify([matches, allPreds]) + '|' + playerEl.value.trim() + '|' + phaseStr(matches);
      watch(reload);
    });
  </script>
</body>
</html>
