<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — جماهير مباريات كأس العالم الرميثية</title>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="adminbtn" href="index.html">🏠 عودة للموقع</a>
    </div>
    <div class="hero">
      <div class="emblem-badge"><span class="emblem-trophy">⚙️</span></div>
      <h1>لوحة التحكم</h1>
      <p>حُط النتيجة بس — الفرق والأدوار تتعبّى تلقائياً</p>
    </div>

    <!-- PIN gate -->
    <div id="gate" class="gate">
      <div class="namebar" style="display:block">
        <label for="pin">كلمة سر المشرف</label>
        <input id="pin" type="password" inputmode="numeric" placeholder="••••" />
      </div>
      <button id="enter" class="btn" style="margin-top:12px">دخول</button>
      <div id="gate-msg" style="color:var(--error);margin-top:10px;font-size:13px"></div>
    </div>

    <div id="panel" style="display:none">
      <div id="list"></div>

      <div class="round-title" style="margin-top:26px">اللاعبون — حذف من الترتيب</div>
      <div id="players" class="card"></div>

      <div class="round-title" style="margin-top:26px;color:var(--error)">تصفير العداد</div>
      <div class="card">
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center">
          عمليات لا يمكن التراجع عنها — استخدمها بحذر.
        </div>
        <button class="btn ghost" id="reset-preds">🗑️ مسح كل التوقعات</button>
        <button class="btn ghost" id="reset-results" style="margin-top:10px">♻️ تصفير النتائج (رجوع للبداية)</button>
        <button class="btn" id="reset-all" style="margin-top:10px;background:var(--error)">⚠️ تصفير كل شي</button>
      </div>

      <a class="adminbtn" href="index.html" style="margin-top:18px">🏠 عودة للموقع</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import {
      loadMatches, loadPredictions, roundLabel, ROUNDS, friendlyError,
      adminVerifyPin, adminSetResult, adminSaveMatch, adminReset,
      adminDeletePlayer, adminReopenMatch, adminSetPoints, scoreRow, watch,
    } from './app.js?v=5';

    const $ = (s, r = document) => r.querySelector(s);
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    let PIN = '';
    let matches = [];
    let allPreds = [];

    // The game starts at the Round of 32 — hide every match before this date.
    const SHOW_FROM = new Date('2026-06-28T00:00:00Z').getTime();
    const afterCutoff = (m) => !m.kickoff || new Date(m.kickoff).getTime() >= SHOW_FROM;

    // players' predictions for a match. For finished matches the points are
    // editable per player (empty input = automatic scoring).
    function predictorsBlock(m) {
      const preds = allPreds.filter((p) => p.match_id === m.id);
      if (!preds.length) {
        return '<div class="predictors-empty">👥 ما توقّع أحد بعد</div>';
      }
      const sorted = preds.slice()
        .sort((a, b) => String(a.player_name).localeCompare(b.player_name, 'ar'));
      const guessOf = (p) => p.pick
        ? '🏆 ' + esc((p.pick === 'home' ? m.home_team : m.away_team) || '')
        : `${p.home_score}-${p.away_score}`;

      if (!m.finished) {
        const items = sorted.map((p) =>
          `<span class="pred-chip">${esc(p.player_name)} <b>${guessOf(p)}</b></span>`).join('');
        return `<details class="predictors">
          <summary>👥 توقعات اللاعبين (${preds.length})</summary>
          <div class="pred-names">${items}</div>
        </details>`;
      }

      const rows = sorted.map((p) => {
        const auto = scoreRow({ ...p, manual_points: null }, m); // automatic value
        const val = p.manual_points != null ? p.manual_points : '';
        const isManual = p.manual_points != null;
        return `<div class="pp-row">
          <span class="pp-name">${esc(p.player_name)} <b>${guessOf(p)}</b></span>
          <input class="pp-input ${isManual ? 'manual' : ''}" type="number" min="0" max="999"
            inputmode="numeric" value="${val}" placeholder="تلقائي ${auto}"
            data-name="${esc(p.player_name)}" />
        </div>`;
      }).join('');
      return `<details class="predictors" open>
        <summary>🎯 نقاط اللاعبين (${preds.length}) — تعديل يدوي</summary>
        <div class="pp-list">${rows}</div>
        <button class="btn ghost pp-save" style="margin-top:8px">💾 حفظ النقاط</button>
        <div class="pp-note">اتركها فاضية = احتساب تلقائي حسب القانون</div>
      </details>`;
    }

    function toast(msg, isErr = false) {
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'toast show' + (isErr ? ' err' : '');
      setTimeout(() => (t.className = 'toast'), 2400);
    }

    // ----- PIN gate: verify against the server without mutating anything -----
    // We call set_result on match id 0 (does not exist):
    //   wrong PIN  -> BAD_PIN
    //   right PIN  -> MATCH_NOT_FOUND  (so PIN is correct)
    $('#enter').onclick = verifyPin;
    $('#pin').addEventListener('keydown', (e) => { if (e.key === 'Enter') verifyPin(); });

    async function verifyPin() {
      const pin = $('#pin').value.trim();
      if (!pin) return;
      $('#gate-msg').textContent = 'جاري التحقق...';
      let ok = false;
      try { ok = await adminVerifyPin(pin); }
      catch (e) { $('#gate-msg').textContent = friendlyError(e); return; }
      if (!ok) { $('#gate-msg').textContent = 'كلمة السر غير صحيحة'; return; }
      PIN = pin;
      sessionStorage.setItem('wc_pin', pin);
      $('#gate').style.display = 'none';
      $('#panel').style.display = '';
      loadList();
      renderPlayers();
      startWatch();
    }

    // Auto-refresh the list when results change — but never while a score is
    // being typed.
    let watching = false;
    function startWatch() {
      if (watching) return;
      watching = true;
      watch(() => {
        const a = document.activeElement;
        if (a && a.matches && a.matches('.r-home, .r-away')) return;
        loadList();
      });
    }

    // ----- render admin rows -----
    // The admin only enters the score. Teams fill in automatically: Round of 32
    // is pre-loaded, and later rounds inherit the winners as results are saved.
    function adminCard(m) {
      const finished = m.finished;
      const home = m.home_team || '—';
      const away = m.away_team || '—';
      const kickoff = m.kickoff
        ? new Date(m.kickoff).toLocaleString('ar', { dateStyle: 'medium', timeStyle: 'short' })
        : '';
      return `<div class="card" data-id="${m.id}">
        <div class="meta">
          <span><b>${esc(roundLabel(m.round))}</b> — مباراة ${m.match_no}</span>
          ${finished ? '<span class="badge done">منتهية</span>'
                     : (m.locked ? '<span class="badge locked">مغلقة</span>'
                                 : '<span class="badge live">مفتوحة</span>')}
        </div>
        ${kickoff ? `<div class="venue-line">🗓️ ${esc(kickoff)}</div>` : ''}

        <div class="match">
          <div class="team home">
            <span class="flag">${esc(m.home_flag || '⚽️')}</span>
            <span class="name ${m.home_team ? '' : 'tbd'}">${esc(home)}</span>
          </div>
          <div class="scorebox">
            <input class="r-home" type="number" min="0" max="99" inputmode="numeric"
              value="${m.home_score ?? ''}" />
            <span class="dash">-</span>
            <input class="r-away" type="number" min="0" max="99" inputmode="numeric"
              value="${m.away_score ?? ''}" />
          </div>
          <div class="team away">
            <span class="flag">${esc(m.away_flag || '⚽️')}</span>
            <span class="name ${m.away_team ? '' : 'tbd'}">${esc(away)}</span>
          </div>
        </div>

        <!-- shown only when the score is a draw in a knockout match -->
        <div class="win-pick" style="display:none;margin-top:10px;text-align:center;font-size:13px;color:var(--muted)">
          تعادل — منو الفائز بالركلات؟
          <div style="display:flex;gap:8px;margin-top:6px">
            <button class="btn ghost win-home" style="flex:1">${esc(home)}</button>
            <button class="btn ghost win-away" style="flex:1">${esc(away)}</button>
          </div>
        </div>

        <div class="card-actions">
          <button class="btn save-result">📣 اعتماد النتيجة (تُحسب النقاط)</button>
        </div>

        <details class="team-edit">
          <summary>✏️ تعديل أسماء الفرق والأعلام</summary>
          <div class="te-grid">
            <input class="e-home"  value="${esc(m.home_team || '')}" placeholder="الفريق الأول" />
            <input class="e-hflag" value="${esc(m.home_flag || '')}" placeholder="🇧🇷" />
            <input class="e-away"  value="${esc(m.away_team || '')}" placeholder="الفريق الثاني" />
            <input class="e-aflag" value="${esc(m.away_flag || '')}" placeholder="🇦🇷" />
          </div>
          <button class="btn ghost save-teams" style="margin-top:8px">💾 حفظ الفرق</button>
        </details>

        ${predictorsBlock(m)}
      </div>`;
    }

    // Compact card for a closed match (finished OR locked) + a re-open button.
    function finishedCard(m) {
      const home = m.home_team || '—', away = m.away_team || '—';
      const hasScore = m.home_score != null && m.away_score != null;
      const scoreHTML = hasScore
        ? `<b>${m.home_score} - ${m.away_score}</b>`
        : '<span style="color:var(--muted)">بدون نتيجة</span>';
      const badge = m.finished
        ? '<span class="badge done">منتهية</span>'
        : '<span class="badge locked">مغلقة 🔒</span>';
      return `<div class="card" data-id="${m.id}" data-finished="1">
        <div class="meta">
          <span><b>${esc(roundLabel(m.round))}</b> — مباراة ${m.match_no}</span>
          ${badge}
        </div>
        <div class="match">
          <div class="team home">
            <span class="flag">${esc(m.home_flag || '⚽️')}</span>
            <span class="name ${m.home_team ? '' : 'tbd'}">${esc(home)}</span>
          </div>
          <div class="scorebox">
            <input class="r-home" type="number" min="0" max="99" inputmode="numeric"
              value="${m.home_score ?? ''}" />
            <span class="dash">-</span>
            <input class="r-away" type="number" min="0" max="99" inputmode="numeric"
              value="${m.away_score ?? ''}" />
          </div>
          <div class="team away">
            <span class="flag">${esc(m.away_flag || '⚽️')}</span>
            <span class="name ${m.away_team ? '' : 'tbd'}">${esc(away)}</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn save-result">💾 تحديث النتيجة (تُحسب النقاط)</button>
          <button class="btn ghost reopen" style="margin-top:8px">♻️ مسح النتيجة وإعادة الفتح</button>
        </div>

        ${predictorsBlock(m)}
      </div>`;
    }

    let lastAdminSig = '';
    function loadList() {
      if (!$('#list').children.length) $('#list').innerHTML = '<div class="empty">جاري التحميل...</div>';
      Promise.all([loadMatches(), loadPredictions()]).then(([data, preds]) => {
        // skip the rebuild if nothing changed (stops the page from jumping on poll)
        const sig = JSON.stringify([data, preds]);
        if (sig === lastAdminSig && $('#list').querySelector('.card')) return;
        lastAdminSig = sig;
        matches = data;
        allPreds = preds || [];
        // matches whose day already passed are dropped from the admin list
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const dayPassed = (m) => {
          if (!m.kickoff) return false;
          const d = new Date(m.kickoff); d.setHours(0, 0, 0, 0);
          return d < today;
        };
        // "open" = playable & not past; "closed" = finished OR locked (re-openable)
        const upcoming = matches.filter((m) => !m.finished && !m.locked && !dayPassed(m));
        const finished = matches.filter((m) => m.finished || m.locked);

        // main list: upcoming matches grouped by DAY (sorted by kickoff)
        const sorted = upcoming.slice().sort((a, b) =>
          (new Date(a.kickoff || 8.64e15)) - (new Date(b.kickoff || 8.64e15)) || a.id - b.id);
        const days = new Map();
        for (const m of sorted) {
          const d = m.kickoff ? new Date(m.kickoff) : null;
          const key = d ? `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}` : 'tbd';
          const label = d
            ? d.toLocaleDateString('ar', { weekday: 'long', day: 'numeric', month: 'long' })
            : 'بدون موعد';
          if (!days.has(key)) days.set(key, { label, items: [] });
          days.get(key).items.push(m);
        }
        let html = upcoming.length
          ? [...days.values()].map((day) =>
              `<div class="round-title day">📅 ${esc(day.label)}</div>` +
              day.items.map(adminCard).join('')).join('')
          : '<div class="empty">ما في مباريات قادمة.</div>';

        // entered results / finished matches — shown open so the admin sees the
        // chosen results directly (matches WITH a result first).
        if (finished.length) {
          const ordered = finished.slice().sort((a, b) => {
            const ah = a.home_score != null ? 0 : 1;
            const bh = b.home_score != null ? 0 : 1;
            return ah - bh || a.id - b.id;
          });
          const withResult = finished.filter((m) => m.home_score != null).length;
          html += `<details class="team-edit" open style="margin-top:24px">
            <summary>🏁 النتائج المُدخلة (${withResult}) · منتهية/مغلقة (${finished.length})</summary>` +
            ordered.map(finishedCard).join('') +
            `</details>`;
        }

        $('#list').innerHTML = html;
        $('#list').querySelectorAll('.card[data-id]').forEach((c) => {
          if (c.dataset.finished) bindFinished(c); else bind(c);
        });
      }).catch((e) => {
        $('#list').innerHTML = `<div class="notice"><span style="color:var(--error)">${esc(e.message || e)}</span></div>`;
      });
    }

    function bindFinished(card) {
      const id = +card.dataset.id;

      // update the result in place (recomputes points)
      const save = card.querySelector('.save-result');
      if (save) save.onclick = async (ev) => {
        const b = ev.currentTarget;
        const h = card.querySelector('.r-home').value;
        const a = card.querySelector('.r-away').value;
        if (h === '' || a === '') { toast('اكتب النتيجة للفريقين', true); return; }
        b.disabled = true;
        try {
          await adminSetResult(id, +h, +a, PIN, null);
          toast('تم تحديث النتيجة ✅ وتحسبت النقاط');
          loadList();
        } catch (e) { toast(friendlyError(e), true); b.disabled = false; }
      };

      // save manual points for each player (empty = revert to automatic)
      const ppSave = card.querySelector('.pp-save');
      if (ppSave) ppSave.onclick = async (ev) => {
        const b = ev.currentTarget; b.disabled = true;
        try {
          for (const inp of card.querySelectorAll('.pp-input')) {
            const raw = inp.value.trim();
            const pts = raw === '' ? null : Math.max(0, Math.min(999, parseInt(raw) || 0));
            await adminSetPoints(id, inp.dataset.name, pts, PIN);
          }
          toast('انحفظت النقاط ✅');
          loadList();
        } catch (e) { toast(friendlyError(e), true); b.disabled = false; }
      };

      const btn = card.querySelector('.reopen');
      if (btn) btn.onclick = async (ev) => {
        if (!window.confirm('تعيد فتح المباراة؟ تنمسح نتيجتها وترجع للجدول.')) return;
        const b = ev.currentTarget; b.disabled = true;
        try {
          await adminReopenMatch(id, PIN);
          toast('انفتحت المباراة ✅');
          loadList();
        } catch (e) { toast(friendlyError(e), true); b.disabled = false; }
      };
    }

    function bind(card) {
      const id = +card.dataset.id;
      const hEl = card.querySelector('.r-home');
      const aEl = card.querySelector('.r-away');
      const pick = card.querySelector('.win-pick');
      const winHome = card.querySelector('.win-home');
      const winAway = card.querySelector('.win-away');
      const isLater = id <= 32; // only knockout matches need a penalty winner on a draw

      function refreshPick() {
        const h = hEl.value, a = aEl.value;
        const draw = h !== '' && a !== '' && +h === +a;
        pick.style.display = draw && isLater ? '' : 'none';
        if (!draw) card.dataset.winner = '';
      }
      function choose(side) {
        card.dataset.winner = side;
        winHome.classList.toggle('saved', side === 'home');
        winAway.classList.toggle('saved', side === 'away');
      }
      hEl.addEventListener('input', refreshPick);
      aEl.addEventListener('input', refreshPick);
      winHome.onclick = () => choose('home');
      winAway.onclick = () => choose('away');
      refreshPick();

      // edit team names / flags (preserve venue, kickoff, lock)
      const teamsBtn = card.querySelector('.save-teams');
      if (teamsBtn) teamsBtn.onclick = async (ev) => {
        const btn = ev.currentTarget; btn.disabled = true;
        const cur = matches.find((x) => x.id === id) || {};
        try {
          await adminSaveMatch(id, {
            home_team: card.querySelector('.e-home').value,
            away_team: card.querySelector('.e-away').value,
            home_flag: card.querySelector('.e-hflag').value,
            away_flag: card.querySelector('.e-aflag').value,
            venue: cur.venue ?? null,
            kickoff: cur.kickoff ?? null,
            locked: cur.locked ?? null,
          }, PIN);
          toast('انحفظت الفرق ✅');
          loadList();
        } catch (e) { toast(friendlyError(e), true); }
        finally { btn.disabled = false; }
      };

      card.querySelector('.save-result').onclick = async (ev) => {
        const btn = ev.currentTarget;
        const h = hEl.value, a = aEl.value;
        const draw = h !== '' && a !== '' && +h === +a;
        if (draw && isLater && !card.dataset.winner) {
          toast('اختر الفائز بالركلات أول', true); return;
        }
        btn.disabled = true;
        try {
          await adminSetResult(id, h === '' ? null : +h, a === '' ? null : +a,
            PIN, card.dataset.winner || null);
          toast(h === '' ? 'انمسحت النتيجة' : 'تم اعتماد النتيجة ✅ وتحسبت النقاط');
          loadList();
        } catch (e) { toast(friendlyError(e), true); }
        finally { btn.disabled = false; }
      };
    }

    // ----- players (delete from leaderboard) -----
    async function renderPlayers() {
      const el = $('#players');
      try {
        const preds = await loadPredictions();
        const names = [...new Set(preds.map((p) => p.player_name))]
          .sort((a, b) => a.localeCompare(b, 'ar'));
        if (!names.length) {
          el.innerHTML = '<div style="color:var(--muted);text-align:center;font-size:13px">ما في لاعبين بعد</div>';
          return;
        }
        el.innerHTML = names.map((n) => `<div class="player-row">
          <span>${esc(n)}</span>
          <button class="btn ghost del-player" data-name="${esc(n)}"
            style="width:auto;padding:6px 14px">حذف</button>
        </div>`).join('');
        el.querySelectorAll('.del-player').forEach((b) => {
          b.onclick = async () => {
            const nm = b.dataset.name;
            if (!window.confirm(`تحذف "${nm}" من الترتيب؟ تنمسح كل توقعاته.`)) return;
            b.disabled = true;
            try {
              await adminDeletePlayer(nm, PIN);
              toast('انحذف اللاعب ✅');
              renderPlayers();
            } catch (e) { toast(friendlyError(e), true); b.disabled = false; }
          };
        });
      } catch (e) {
        el.innerHTML = `<div style="color:var(--error);font-size:13px">${esc(e.message || e)}</div>`;
      }
    }

    // ----- reset buttons -----
    function doReset(what, msg) {
      return async (ev) => {
        if (!window.confirm(msg)) return;
        const btn = ev.currentTarget; btn.disabled = true;
        try {
          await adminReset(what, PIN);
          toast('تم التصفير ✅');
          loadList();
          renderPlayers();
        } catch (e) { toast(friendlyError(e), true); }
        finally { btn.disabled = false; }
      };
    }
    $('#reset-preds').onclick = doReset('predictions', 'متأكد تبي تمسح كل التوقعات؟ ما يمكن التراجع.');
    $('#reset-results').onclick = doReset('results', 'متأكد تبي تصفّر كل النتائج وترجع المباريات للبداية؟');
    $('#reset-all').onclick = doReset('all', '⚠️ هذا يمسح التوقعات والنتائج كلها. متأكد؟');

    // boot
    const saved = sessionStorage.getItem('wc_pin');
    if (saved) { $('#pin').value = saved; }
  </script>
</body>
</html>
