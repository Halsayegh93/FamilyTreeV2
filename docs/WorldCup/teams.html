<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>ترتيب المنتخبات — جماهير مباريات كأس العالم الرميثية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=32" />
  <style>
    .ts-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px;
      border-bottom: 1px solid var(--border); }
    .ts-row:last-child { border-bottom: none; }
    .ts-medal { font-size: 20px; width: 30px; text-align: center; flex-shrink: 0; }
    .ts-name { font-weight: 800; font-size: 14.5px; color: var(--text); min-width: 0; }
    .ts-detail { margin-inline-start: auto; font-size: 12px; color: var(--muted);
      text-align: left; flex-shrink: 0; }
    .ts-detail b { color: var(--text); }
    .ts-sub { font-size: 12.5px; color: var(--muted); margin: -6px 4px 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="adminbtn" href="index.html">🏠 عودة للموقع</a>
    </div>
    <div class="hero">
      <div class="emblem-badge">
        <span class="emblem-trophy">📊</span>
        <span class="emblem-26">26</span>
      </div>
      <h1>ترتيب المنتخبات</h1>
      <p>مشوار الـ16 المتأهلين — من دور الـ16 إلى منصة التتويج</p>
    </div>

    <div id="content"><div class="empty">جاري التحميل...</div></div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import {
      loadMatches, flagHTML, roundLabel, watch,
      loadRevealFinals, maskHiddenFinals,
    } from './app.js?v=32';

    const $ = (s, r = document) => r.querySelector(s);
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    const ROUND_ORDER = ['R16', 'QF', 'SF', '3RD', 'FINAL'];
    const rIdx = (r) => ROUND_ORDER.indexOf(r);

    const dayFmt = (iso) => {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleDateString('ar', { weekday: 'long', day: 'numeric', month: 'long' });
      } catch { return ''; }
    };

    // winner/loser of a finished match (regular score, else the shootout)
    function sideOf(m, want) {   // want: 'w' | 'l'
      if (!m.finished) return null;
      let d = Math.sign((m.home_score ?? 0) - (m.away_score ?? 0));
      if (d === 0 && m.home_pen != null && m.away_pen != null && m.home_pen !== m.away_pen)
        d = m.home_pen > m.away_pen ? 1 : -1;
      if (d === 0) return null;
      return (d > 0) === (want === 'w') ? m.home_team : m.away_team;
    }
    // how the loss reads: "0-3" or "1-1 (ركلات 3-4)"
    function lossScore(m, team) {
      const home = m.home_team === team;
      const gs = home ? `${m.home_score}-${m.away_score}` : `${m.away_score}-${m.home_score}`;
      if (m.home_pen != null && m.away_pen != null)
        return `${gs} (ركلات ${home ? `${m.home_pen}-${m.away_pen}` : `${m.away_pen}-${m.home_pen}`})`;
      return gs;
    }

    function standings(ms) {
      const knockout = ms.filter((m) => ROUND_ORDER.includes(m.round));
      const r16 = knockout.filter((m) => m.round === 'R16');
      const flags = new Map();
      for (const m of r16) {
        if (m.home_team) flags.set(m.home_team, m.home_flag);
        if (m.away_team) flags.set(m.away_team, m.away_flag);
      }
      const teams = [];
      for (const [team, flag] of flags) {
        const mine = knockout
          .filter((m) => m.home_team === team || m.away_team === team)
          .sort((a, b) => rIdx(a.round) - rIdx(b.round));
        const last = mine[mine.length - 1];
        const t = { team, flag, group: 'alive', roundIdx: rIdx(last.round), detail: '', order: 99 };

        if (last.round === 'FINAL' && last.finished) {
          const won = sideOf(last, 'w') === team;
          t.group = won ? 'champion' : 'runner';
          t.order = won ? 1 : 2;
        } else if (last.round === '3RD' && last.finished) {
          const won = sideOf(last, 'w') === team;
          t.group = won ? 'third' : 'fourth';
          t.order = won ? 3 : 4;
        } else if (!last.finished) {
          // still playing: next/current match (the round shows as the group title)
          const opp = last.home_team === team ? last.away_team : last.home_team;
          t.detail = `${opp ? `ضد <b>${esc(opp)}</b>` : ''}${last.kickoff ? ` · ${esc(dayFmt(last.kickoff))}` : ''}`;
        } else {
          // finished and the team lost it -> eliminated at this round
          const opp = last.home_team === team ? last.away_team : last.home_team;
          t.group = 'out';
          t.detail = `خسر أمام <b>${esc(opp || '')}</b> ${esc(lossScore(last, team))}`;
        }
        teams.push(t);
      }
      return teams;
    }

    const row = (t, medal) => `<div class="ts-row">
      <span class="ts-medal">${medal}</span>
      ${flagHTML(t.flag)}
      <span class="ts-name">${esc(t.team)}</span>
      <span class="ts-detail">${t.detail}</span>
    </div>`;

    async function render() {
      let ms, reveal;
      try {
        [ms, reveal] = await Promise.all([loadMatches(), loadRevealFinals()]);
      } catch (e) {
        $('#content').innerHTML = `<div class="notice"><span style="color:var(--error)">${esc(e.message || e)}</span></div>`;
        return;
      }
      ms = maskHiddenFinals(ms, reveal);
      const ts = standings(ms);
      if (!ts.length) {
        $('#content').innerHTML = '<div class="empty">فرق دور الـ16 ما تحددت بعد ⚽️</div>';
        return;
      }

      let html = '';

      // 🏆 podium (only once decided — hidden finals stay masked)
      const podium = [
        ['champion', '🏆', 'بطل كأس العالم'],
        ['runner',   '🥈', 'الوصيف'],
        ['third',    '🥉', 'المركز الثالث'],
        ['fourth',   '4️⃣', 'المركز الرابع'],
      ].map(([g, medal, label]) => {
        const t = ts.find((x) => x.group === g);
        return t ? row({ ...t, detail: label }, medal) : '';
      }).join('');
      if (podium) html += `<div class="round-title">🏆 منصة التتويج</div><div class="card">${podium}</div>`;

      // ✅ still in the tournament — grouped by round, round name on top
      const alive = ts.filter((t) => t.group === 'alive');
      const aliveRounds = [...new Set(alive.map((t) => t.roundIdx))].sort((a, b) => b - a);
      for (const ri of aliveRounds) {
        const g = alive.filter((t) => t.roundIdx === ri)
          .sort((a, b) => a.team.localeCompare(b.team));
        html += `<div class="round-title">✅ ${esc(roundLabel(ROUND_ORDER[ri]))} <span class="day-count">(${g.length})</span></div>
          <div class="card">${g.map((t) => row(t, '⚽️')).join('')}</div>`;
      }

      // ❌ eliminated, grouped by the round they fell in (later rounds first)
      const outs = ts.filter((t) => t.group === 'out');
      const OUT_GROUPS = [
        [rIdx('SF'),  'ودّعوا من نص النهائي',  'المركزان 3-4'],
        [rIdx('QF'),  'ودّعوا من ربع النهائي',  'المراكز 5-8'],
        [rIdx('R16'), 'ودّعوا من دور الـ16',    'المراكز 9-16'],
      ];
      for (const [idx, label, ranks] of OUT_GROUPS) {
        const g = outs.filter((t) => t.roundIdx === idx)
          .sort((a, b) => a.team.localeCompare(b.team));
        if (!g.length) continue;
        html += `<div class="round-title">❌ ${label} <span class="day-count">(${ranks})</span></div>
          <div class="card">${g.map((t) => row(t, '💔')).join('')}</div>`;
      }

      $('#content').innerHTML = html || '<div class="empty">ما في بيانات بعد ⚽️</div>';
    }

    render();
    watch(render);
  </script>
</body>
</html>
